version: 2.1

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main

      - deploy:
          filters:
            branches:
              only:
                - main
          requires:
            - build

jobs:
  build:
    working_directory: ~/SimpleApplication
    docker:
      - image: cimg/node:20.17

    steps:
      - checkout

      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}

      - run:
          name: install-npm
          command: npm install

      - run:
          name: run-tests
          command: npm test


      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
  deploy:
    docker:
      - image: cimg/node:20.17

    steps:
      - add_ssh_keys:
          fingerprints:
            - "SHA256:9ZvMy3J58iuA650HCJKu3fACGzm+hygP9uwZEN6aGIs"
      - run:
          name: deploy-to-production
          command: |
            ssh -o StrictHostKeyChecking=no ubuntu@$EC2_PUBLIC_DNS << 'EOF'
              rm -rf SimpleApplication
              git clone https://github.com/MazeTech89/SimpleApplication.git
              cd SimpleApplication
              chmod +x deploy.sh
              ./deploy.sh
            EOF