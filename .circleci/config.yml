version: 2.1

workflows:
  version: 2
  build:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main

      - deploy:
          filters:
            branches:
              only:
                - main
          requires:
            - build

jobs:
  build:
    working_directory: ~/SimpleApplication
    docker:
      - image: cimg/node:20.17

    steps:
      - checkout

      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}

      - run:
          name: install-npm
          command: npm install

      - run:
          name: run-tests
          command: npm test


      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
  deploy:
    docker:
      - image: cimg/node:20.17

    steps:

      - run:
          name: deploy-to-production
          command: ssh -o StrictHostKeyChecking=no $EC2_X20126204@$EC2_PUBLIC_DNS "rm -rf SimpleApplication/;git clone https://github.com/MazeTech89/SimpleApplication.git source SimpleApplication/deploy.sh"