version: 2.1

workflows:
  build:
    jobs:
      - build:
          filters:
            branches:
              only:
                - main

      - deploy:
          filters:
            branches:
              only:
                - main
          requires:
            - build

jobs:
  build:
    working_directory: ~/SimpleApplication
    docker:
      - image: cimg/node:20.17

    steps:
      - checkout

      - restore_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}

      - run:
          name: install-npm
          command: npm install

      - run:
          name: run-tests
          command: npm test

      - save_cache:
          key: dependency-cache-{{ checksum "package-lock.json" }}
          paths:
            - ./node_modules
  deploy:
    working_directory: ~/SimpleApplication
    docker:
      - image: cimg/node:20.17

    steps:
      - checkout

      - run:
          name: check-environment
          command: |
            if [ -z "$EC2_PUBLIC_DNS" ]; then
              echo "EC2_PUBLIC_DNS not set"
              exit 1
            fi
      - add_ssh_keys:
          fingerprints:
            - "SHA256:9ZvMy3J58iuA650HCJKu3fACGzm+hygP9uwZEN6aGIs"
      - run:
          name: add-host-to-known-hosts
          command: |
            mkdir -p ~/.ssh
            ssh-keyscan -H $EC2_PUBLIC_DNS >> ~/.ssh/known_hosts 2>/dev/null || true
      - run:
          name: deploy-to-production
          command: |
            ssh -T -o ConnectTimeout=60 ubuntu@$EC2_PUBLIC_DNS \<< 'EOF'
              rm -rf SimpleApplication
              git clone ${GITHUB_REPO_URL:-https://github.com/MazeTech89/SimpleApplication.git}
              cd SimpleApplication
              chmod +x deploy.sh
              ./deploy.sh
            EOF
      - run:
          name: verify-deployment
          command: |
            sleep 15
            MAX_ATTEMPTS=5
            ATTEMPT=1
            WAIT_TIME=2
            until [ $ATTEMPT -gt $MAX_ATTEMPTS ]; do
              if curl -f --connect-timeout 5 --max-time 10 http://$EC2_PUBLIC_DNS:3000/health; then
                echo "Health check passed"
                exit 0
              fi
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Attempt $ATTEMPT failed. Retrying in ${WAIT_TIME}s..."
                sleep $WAIT_TIME
                WAIT_TIME=$((WAIT_TIME * 2))
              fi
              ATTEMPT=$((ATTEMPT + 1))
            done
            echo "Health check failed after $MAX_ATTEMPTS attempts"
            exit 1